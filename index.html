<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locomotive Scroll Parallax</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.css">
</head>
<body>
    <div id="main" data-scroll-container>

        <!-- Section 1 -->
        <section class="section hero" data-scroll-section>
            <h1 data-scroll data-scroll-speed="2">Parallax Magic ✨</h1>
        </section>

        <!-- Section 2 with parallax image -->
        <section class="section image-section" data-scroll-section>
            <img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0" 
                 alt="Nature" 
                 data-scroll 
                 data-scroll-speed="-3">
        </section>

        <!-- Section 3 -->
        <section class="section text-section" data-scroll-section>
            <h2 data-scroll data-scroll-speed="1">Smooth Scrolling with Locomotive</h2>
            <p data-scroll data-scroll-speed="2">
                This is a demo of Locomotive Scroll with GSAP animations.
                Scroll down and watch the elements move at different speeds.
            </p>
        </section>

        <!-- Section 4 with another image -->
        <section class="section image-section" data-scroll-section>
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                 alt="Mountains"
                 data-scroll 
                 data-scroll-speed="-2">
        </section>

        <!-- Section 5 - Doll at the bottom -->
        <section class="section doll-section" data-scroll-section>
            <div id="doll-container" data-scroll data-scroll-speed="2"></div>
            <h2 data-scroll data-scroll-speed="1">Meet our animated friend!</h2>
        </section>

    </div>

    <!-- Locomotive Scroll -->
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.js"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/TextPlugin.min.js"></script>

    <!-- Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
